<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhapathon Wonder Conference</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img src="rhapathon-banner.jpg" alt="Rhapathon Wonder Conference" id="banner-image">
        </div>
        
        <div class="form-container">
            <h1>Rhapathon Wonder Conference Registration</h1>
            <form id="rhapathon-form" action="process.php" method="POST">
                <div class="form-section">
                    <h2>Personal Information</h2>
                    <div class="form-group">
                        <label for="fullName">Full Name *</label>
                        <input type="text" id="fullName" name="fullName" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="organization">Organization/Company</label>
                        <input type="text" id="organization" name="organization">
                    </div>
                    
                    <div class="form-group">
                        <label for="position">Position/Title</label>
                        <input type="text" id="position" name="position">
                    </div>
                </div>
                
                <div class="form-section">
                    <h2>Participation Information</h2>
                    <div class="form-group">
                        <label for="participationType">Participation Type *</label>
                        <select id="participationType" name="participationType" required>
                            <option value="">Select participation type</option>
                            <option value="speaker">Speaker</option>
                            <option value="participant">Participant</option>
                            <option value="sponsor">Sponsor</option>
                            <option value="volunteer">Volunteer</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="experience">Experience Level *</label>
                        <select id="experience" name="experience" required>
                            <option value="">Select experience level</option>
                            <option value="beginner">Beginner</option>
                            <option value="intermediate">Intermediate</option>
                            <option value="advanced">Advanced</option>
                            <option value="expert">Expert</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="interests">Areas of Interest</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="interests[]" value="technology"> Technology</label>
                            <label><input type="checkbox" name="interests[]" value="innovation"> Innovation</label>
                            <label><input type="checkbox" name="interests[]" value="entrepreneurship"> Entrepreneurship</label>
                            <label><input type="checkbox" name="interests[]" value="healthcare"> Healthcare</label>
                            <label><input type="checkbox" name="interests[]" value="education"> Education</label>
                            <label><input type="checkbox" name="interests[]" value="sustainability"> Sustainability</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="previousParticipation">Have you participated in Rhapathon before?</label>
                        <div class="radio-group">
                            <label><input type="radio" name="previousParticipation" value="yes"> Yes</label>
                            <label><input type="radio" name="previousParticipation" value="no"> No</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="expectations">What do you expect from this conference?</label>
                        <textarea id="expectations" name="expectations" rows="4" placeholder="Share your expectations..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="specialRequirements">Special Requirements or Accommodations</label>
                        <textarea id="specialRequirements" name="specialRequirements" rows="3" placeholder="Any accessibility needs or special requirements..."></textarea>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" name="terms" required>
                            I agree to the <a href="#" target="_blank">terms and conditions</a> *
                        </label>
                    </div>
                    
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="newsletter" name="newsletter">
                            Subscribe to our newsletter for updates
                        </label>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Register for Rhapathon</button>
                    <button type="reset" class="reset-btn">Clear Form</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
